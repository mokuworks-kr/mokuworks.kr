name: Supabase Keep-Alive

# Supabase 무료 플랜은 7일간 활동이 없으면 프로젝트를 일시정지(pause)합니다.
# 주 1회 가벼운 REST 요청을 보내 활동을 기록하고 일시정지를 방지합니다.

on:
  schedule:
    # 매주 월요일 09:00 KST (00:00 UTC) — 7일 간격보다 충분히 짧음
    - cron: "0 0 * * 1"
  workflow_dispatch: {} # 수동 실행 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL 또는 SUPABASE_ANON_KEY 시크릿이 설정되지 않았습니다."
            exit 1
          fi

          # products 테이블에 최소 비용의 HEAD 요청 (행 데이터는 가져오지 않음)
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X HEAD \
            "${SUPABASE_URL}/rest/v1/products?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Range: 0-0")

          echo "HTTP status: $status"

          # 2xx 또는 RLS로 인한 거부(401/403)도 "DB가 깨어있음"을 의미하므로 성공으로 간주
          case "$status" in
            2*|401|403)
              echo "✅ Supabase 활성 상태 확인 (status $status)"
              ;;
            *)
              echo "::error::예상치 못한 응답: $status"
              exit 1
              ;;
          esac
